; ASCII Aquarium - ported from POWER-PILL/ASCII-Aquarium (CYD/ILI9341/XPT2046)
; to a custom ESP32-S3-N8R2 board with ST7789 320x240 SPI TFT + EC11 rotary
; encoder + K0 push button (no touch panel).
;
; Wiring:
;   TFT   SCLK=12 MOSI=11 RST=8 DC=9 CS=10 BLK=7   (no MISO)
;   EC11  A=4 B=5 PUSH=6
;   K0    15

[env:esp32-s3-n8r2]
; Arduino-ESP32 core 3.x (IDF5, used by newer espressif32/pioarduino platform
; releases) has an unresolved TFT_eSPI incompatibility on the S3: SPI
; beginTransaction() dereferences a null handle and the board boot-loops with
; a StoreProhibited panic in TFT_eSPI::begin_tft_write(). The documented fix
; (see Bodmer/TFT_eSPI#3743, #3332, #3289 and the Arduino forum) is to use
; Arduino-ESP32 core 2.0.x instead, which is what the tasmota fork of
; espressif32 below pins.
;
; PSRAM is intentionally NOT enabled: turning it on (memory_type=qio_qspi)
; produced an early TG1WDT_SYS_RST reboot loop (watchdog firing during
; bootloader-stage PSRAM init, before any application code/log runs). The
; single 320x240x16bpp canvas is only ~150KB, which fits comfortably in the
; S3's internal SRAM, so PSRAM was never actually required here - dropping
; it sidesteps the hang entirely.
platform = https://github.com/tasmota/platform-espressif32/releases/download/2024.06.00/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

board_upload.flash_size = 8MB
board_build.partitions = default_8MB.csv

monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DUSER_SETUP_LOADED=1
    -include include/User_Setup.h
    -DCORE_DEBUG_LEVEL=0
    ; Board sets ARDUINO_USB_MODE=1 (native USB) without CDC_ON_BOOT, so
    ; Serial falls back to UART0 instead of the native USB port - force it
    ; on so `Serial` prints over the same USB cable used for flashing.
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
