; ASCII Aquarium - ported from POWER-PILL/ASCII-Aquarium (CYD/ILI9341/XPT2046)
; to a custom ESP32-S3-N8R2 board with ST7789 320x240 SPI TFT + EC11 rotary
; encoder + K0 push button (no touch panel).
;
; Wiring:
;   TFT   SCLK=12 MOSI=11 RST=8 DC=9 CS=10 BLK=7   (no MISO)
;   EC11  A=4 B=5 PUSH=6
;   K0    15

[env:esp32-s3-n8r2]
; History: this board boot-looped with a StoreProhibited panic in
; TFT_eSPI::begin_tft_write() on Arduino-ESP32 core 3.x, which looked like a
; core-version incompatibility, so this env was temporarily pinned to core
; 2.0.18 (tasmota fork). That "fixed" the TFT_eSPI crash but traded it for a
; TG1WDT_SYS_RST watchdog reboot loop that turned out to be unrelated to our
; app - PSRAM is genuinely present on this chip (confirmed via esptool:
; "Embedded PSRAM 2MB") and core 3.x booted past it fine (it reached
; tft.init() cleanly with a full, symbolicated crash dump). So core 2.0.18
; wasn't actually a good trade.
;
; The real root cause: TFT_eSPI's ESP32-S3 SPI port selection defaults to
; `FSPI`, which Arduino-ESP32 core 3.x's SPIClass maps to host 0 - invalid on
; S3 (only hosts 2/3 are usable), so REG_SPI_BASE(0) resolves to a bogus
; register base and the first SPI transaction hard-faults. This is a known,
; documented TFT_eSPI/core-3.x issue (Bodmer/TFT_eSPI#3488, "Fix Boot Loop on
; ESP32S3 Due to Mis-defined SPI Port"); the documented workaround, applied
; in include/User_Setup.h, is `#define USE_HSPI_PORT` to force a valid host.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.31-2/platform-espressif32.zip
board = esp32-s3-devkitc1-n8r2
framework = arduino

monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DBOARD_HAS_PSRAM
    -DUSER_SETUP_LOADED=1
    -include include/User_Setup.h
    -DCORE_DEBUG_LEVEL=0

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43

; Re-applies a fix to TFT_eSPI's vendored ESP32-S3 DMA code every build (see
; scripts/patch_tft_espi_dma.py for why) - PlatformIO re-fetches the library
; into .pio/libdeps on a clean install, which would otherwise silently drop
; a hand edit made directly to that copy.
extra_scripts = pre:scripts/patch_tft_espi_dma.py
