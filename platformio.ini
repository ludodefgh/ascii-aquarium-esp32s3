; ASCII Aquarium - ported from POWER-PILL/ASCII-Aquarium (CYD/ILI9341/XPT2046)
; to a custom ESP32-S3-N8R2 board with ST7789 320x240 SPI TFT + EC11 rotary
; encoder + K0 push button (no touch panel).
;
; Wiring:
;   TFT   SCLK=12 MOSI=11 RST=8 DC=9 CS=10 BLK=7   (no MISO)
;   EC11  A=4 B=5 PUSH=6
;   K0    15

[env:esp32-s3-n8r2]
; pioarduino fork of espressif32 ships a ready-made N8R2 board definition
; (8MB quad flash / 2MB quad PSRAM) with the correct partitions/memory_type
; baked in, so no manual flash/psram overrides are needed here.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.31-2/platform-espressif32.zip
board = esp32-s3-devkitc1-n8r2
framework = arduino

monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DBOARD_HAS_PSRAM
    -DUSER_SETUP_LOADED=1
    -include include/User_Setup.h
    -DCORE_DEBUG_LEVEL=0

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
